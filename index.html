<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero-SMS Pro 🇮🇩</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div id="appView" class="container">
        
        <div class="server-switcher">
            <select onchange="window.location.href=this.value" class="server-select" style="color: #3b82f6; border-color: #93c5fd;">
                <option value="index.html" selected>🔵 Hero-SMS</option>
                <option value="index2.html">🟠 SMSCode</option>
            </select>
        </div>

        <div class="app-header-container" style="margin-top: 25px;">
            <div class="header-titles">
                <h1 style="color: #2563eb;">Hero-SMS 🇮🇩</h1>
                <p class="subtitle">👨‍💻 Akun: <strong id="currentAccountName">Memuat...</strong></p>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button id="btnOpenNotes" class="btn-switch" style="background-color: #fef08a; color: #b45309; border-color: #fde68a;">
                    <i class="fas fa-sticky-note"></i> Catatan
                </button>
            </div>
        </div>
        
        <div class="balance-container">
            <div class="balance-badge">
                <span class="balance-label">Sisa Saldo</span>
                <span id="balanceDisplay" class="balance-value">Memuat...</span>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h3 class="section-title">Pesanan Aktif (<span id="activeCount">0</span>)</h3>
            </div>
            <div id="activeOrdersContainer">
                <div class="status-text">Belum ada pesanan aktif.</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h3 class="section-title">Pilih Operator (Termurah)</h3>
            </div>
            <div id="productList" class="product-list">
                <div class="status-text">Memuat data Server...</div>
            </div>
            <button id="btnOrder" class="btn-primary" disabled style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);">Pesan Nomor Baru</button>
        </div>
    </div>

    <div id="exitModal" class="modal hidden">
        <div class="modal-content">
            <h3 class="modal-title">Keluar Aplikasi?</h3>
            <p class="modal-desc">Apakah Anda yakin ingin menutup dan keluar dari aplikasi ini?</p>
            <div class="modal-actions">
                <button onclick="closeExitModal()" class="btn-switch" style="width:48%; padding:12px;">Batal</button>
                <button onclick="confirmExit()" class="btn-danger" style="width:48%; padding:12px; border-radius:8px;">Keluar</button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">Berhasil disalin!</div>

    <script src="app2.js"></script>
</body>
</html>
