

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My App Hub</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --white: #ffffff;
            --text-main: #050505;
            --text-muted: #65676b;
            --primary: #1877f2;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; 
        }

        /* TOMBOL MENGAMBANG (POJOK KANAN BAWAH + ANIMASI) */
        .floating-menu-btn {
            position: fixed; bottom: 25px; right: 25px; width: 42px; height: 42px;
            background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 18px; color: #1a1a1a; box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            z-index: 90; cursor: pointer; -webkit-tap-highlight-color: transparent;
            /* Efek pegas (bounce) yang membal saat animasi transform */
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.3s ease, background-color 0.2s;
        }
        /* Animasi sederhana saat ditahan */
        .floating-menu-btn:active { transform: scale(0.85) rotate(15deg); background-color: #ffffff; }

        /* AREA KONTEN (FULL SCREEN) */
        .main-workspace { height: 100%; width: 100%; position: relative; background: #000; }
        
        #appFrame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            border: none; background: var(--bg-color); z-index: 10; display: none; 
        }
        #appFrame.active { display: block; }

        /* OVERLAY GELAP SIDEBAR */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .overlay.show { opacity: 1; pointer-events: all; }

        /* MENU SIDEBAR (ESTETIK DINAMIS) */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            /* Latar belakang default, akan ditimpa oleh JS agar sesuai dengan langit */
            background: var(--white); color: var(--text-main);
            z-index: 101; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 1s ease, color 0.5s ease;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2); display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        
        .sidebar-header { 
            padding: 25px 20px 15px; 
            border-bottom: 1px solid rgba(128, 128, 128, 0.2); /* Transparan agar menyatu dengan background */
            display: flex; justify-content: space-between; align-items: center; 
        }
        .sidebar-title { font-size: 20px; font-weight: 800; margin: 0; color: inherit; }
        .close-btn { font-size: 24px; color: inherit; opacity: 0.8; cursor: pointer; transition: 0.2s; }
        .close-btn:active { transform: scale(0.8); }
        
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 15px 0; }
        .menu-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px 20px; 
            color: inherit; text-decoration: none; font-size: 15px; font-weight: 600; 
            transition: 0.2s; cursor: pointer; 
        }
        .menu-item:active { background-color: rgba(255, 255, 255, 0.25); } /* Efek hover kaca */
        .menu-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; background: rgba(255, 255, 255, 0.5); }
        
        .loader-bar { position: absolute; top: 0; left: 0; width: 0%; height: 3px; background: var(--primary); transition: width 0.3s; z-index: 95; }

        /* --- STYLING PUSAT KOMANDO --- */
        #placeholder {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; z-index: 2; 
        }

        /* ========================================= */
        /* 🎨 KANVAS LANGIT DINAMIS & ANIMASI KARTUN */
        /* ========================================= */
        #skyCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; transition: background 1s ease; }

        .sky-morning { background: linear-gradient(180deg, #87CEEB 0%, #FFB6C1 50%, #FFDAB9 100%); }
        .sky-day { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); }
        .sky-afternoon { background: linear-gradient(180deg, #2c3e50 0%, #fd746c 100%); }
        .sky-night { background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }

        .celestial { position: absolute; border-radius: 50%; }
        .sun-morning { width: 80px; height: 80px; background: #FFD700; right: 15%; bottom: -100px; box-shadow: 0 0 40px #FFD700; animation: sunrise 4s ease-out forwards; }
        .sun-day { width: 100px; height: 100px; background: #FFDF00; right: -20px; top: -20px; box-shadow: 0 0 60px #FFDF00; }
        .sun-afternoon { width: 90px; height: 90px; background: #FF4500; right: 20%; bottom: 100px; box-shadow: 0 0 50px #FF4500; animation: sunset 4s ease-in forwards; }
        .moon-night { width: 70px; height: 70px; background: #F4F6F0; right: 20px; top: 30px; box-shadow: 0 0 30px #F4F6F0; }
        .moon-night::after { content: ''; position: absolute; top: -10px; right: -10px; width: 60px; height: 60px; background: inherit; border-radius: 50%; background: var(--bg-night); } 

        @keyframes sunrise { to { bottom: 100px; } }
        @keyframes sunset { to { bottom: -50px; opacity: 0.5; } }

        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .c1 { width: 120px; height: 40px; top: 15%; animation: wind 25s linear infinite; }
        .c1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .c1::after { width: 45px; height: 45px; top: -15px; right: 20px; }
        .c2 { width: 80px; height: 30px; top: 35%; opacity: 0.5; animation: wind 18s linear infinite reverse; }
        .c2::before { width: 40px; height: 40px; top: -20px; left: 15px; }

        @keyframes wind { 0% { left: -150px; } 100% { left: 100vw; } }

        .star { position: absolute; background: white; border-radius: 50%; }
        .shooting-star {
            position: absolute; top: 10%; right: 20%; width: 120px; height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1), rgba(255,255,255,0));
            transform: rotate(-45deg); opacity: 0; animation: shoot 5s infinite;
        }
        @keyframes shoot { 
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; }
            15% { transform: translateX(-300px) translateY(300px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Tombol Mengambang (Pojok Kanan Bawah) -->
    <div class="floating-menu-btn" id="menuBtn" onclick="openSidebar()">☰</div>

    <!-- OVERLAY & SIDEBAR (TEMA DINAMIS) -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">Workspace</h2>
            <div class="close-btn" onclick="closeSidebar()">×</div>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="goHome()">
                <div class="menu-icon" style="background: rgba(255,255,255,0.7); color: #333;">🏠</div> Layar Utama
            </div>
            
            <hr style="border:0; border-top:1px solid rgba(128,128,128,0.2); margin: 10px 20px;">
            
            <!-- Daftar Aplikasi -->
            <div class="menu-item" onclick="loadApp('herosms/herosms.html', 'Hero-SMS', '💬', '#e0e7ff', '#4f46e5')">
                <div class="menu-icon" style="background:#e0e7ff; color:#4f46e5;">💬</div> Hero-SMS Pro
            </div>
            <div class="menu-item" onclick="loadApp('smscode/smscode.html', 'SMS Code', '📩', '#fce7f3', '#db2777')">
                <div class="menu-icon" style="background:#fce7f3; color:#db2777;">📩</div> SMS Code
            </div>
            <div class="menu-item" onclick="loadApp('affiliate/namadandirectlink.html', 'Affiliate', '🛒', '#ffedd5', '#ea580c')">
                <div class="menu-icon" style="background:#ffedd5; color:#ea580c;">🛒</div> Shopee Affiliate
            </div>
            <div class="menu-item" onclick="loadApp('tools.html', 'Tools', '⚙️', '#f3f4f6', '#4b5563')">
                <div class="menu-icon" style="background:#f3f4f6; color:#4b5563;">⚙️</div> Tools Lainnya
            </div>
        </div>
    </div>

    <!-- WORKSPACE UTAMA -->
    <div class="main-workspace">
        <div class="loader-bar" id="loaderBar"></div>
        
        <!-- KANVAS LANGIT -->
        <div id="skyCanvas"></div>

        <!-- PUSAT KOMANDO -->
        <div id="placeholder">
            <!-- SAPAAN, JAM, TANGGAL -->
            <div style="text-align: center; margin-bottom: 40px; transition: color 0.3s; width: 100%;" id="greetingContainer">
                <h1 style="margin: 0; font-size: 26px; font-weight: 700;" id="greetingText">Selamat Datang</h1>
                <div id="timeText" style="font-size: 64px; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; letter-spacing: -2px;">00:00</div>
                <p style="margin: 0; font-size: 15px; font-weight: 600; opacity: 0.9;" id="dateText">Memuat tanggal...</p>
            </div>

            <!-- RIWAYAT APLIKASI (RECENT APPS) -->
            <div style="width: 100%; max-width: 340px; text-align: center; transition: color 0.3s;" id="recentContainer">
                <div style="font-size: 11px; font-weight: 800; margin-bottom: 15px; opacity: 0.8; letter-spacing: 1px;">TERAKHIR DIBUKA</div>
                <div id="recentAppsRow" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <!-- Ikon aplikasi riwayat akan muncul di sini via JavaScript -->
                </div>
            </div>
        </div>

        <!-- Wadah Aplikasi -->
        <iframe id="appFrame"></iframe>
    </div>

    <!-- SCRIPT -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const appFrame = document.getElementById('appFrame');
        const placeholder = document.getElementById('placeholder');
        const loaderBar = document.getElementById('loaderBar');
        const menuBtn = document.getElementById('menuBtn');
        const skyCanvas = document.getElementById('skyCanvas');
        const greetingContainer = document.getElementById('greetingContainer');
        const recentContainer = document.getElementById('recentContainer');
        const recentAppsRow = document.getElementById('recentAppsRow');

        // --- SISTEM RIWAYAT APLIKASI ---
        let recentApps = JSON.parse(localStorage.getItem('hub_recent_apps')) || [];

        function renderRecentApps() {
            if (recentApps.length === 0) {
                recentAppsRow.innerHTML = '<span style="font-size: 13px; opacity: 0.7;">Belum ada riwayat.</span>';
                return;
            }
            
            let html = '';
            recentApps.forEach(app => {
                html += `
                <div onclick="loadApp('${app.url}', '${app.name}', '${app.icon}', '${app.bg}', '${app.color}')" 
                     style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.1s;">
                    <div style="width: 56px; height: 56px; border-radius: 16px; background: ${app.bg}; color: ${app.color}; 
                                display: flex; justify-content: center; align-items: center; font-size: 26px; 
                                box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                        ${app.icon}
                    </div>
                    <span style="font-size: 11px; font-weight: 700; max-width: 65px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${app.name}</span>
                </div>`;
            });
            recentAppsRow.innerHTML = html;
        }
        renderRecentApps(); 

        // --- FUNGSI NAVIGASI & ANIMASI TOMBOL ---
        function openSidebar() { 
            sidebar.classList.add('open'); 
            overlay.classList.add('show'); 
            // Animasi memutar dan mengecil hingga menghilang
            menuBtn.style.transform = "scale(0) rotate(-180deg)"; 
            menuBtn.style.opacity = "0"; 
        }
        
        function closeSidebar() { 
            sidebar.classList.remove('open'); 
            overlay.classList.remove('show'); 
            // Animasi memutar kembali dan membal (bouncing)
            menuBtn.style.transform = "scale(1) rotate(0deg)"; 
            menuBtn.style.opacity = "1"; 
        }

        function loadApp(url, name, icon, bg, color) {
            closeSidebar(); 
            if(!url) return;

            if(name && icon) {
                recentApps = recentApps.filter(a => a.url !== url);
                recentApps.unshift({ url, name, icon, bg, color });
                if(recentApps.length > 4) recentApps.pop();
                localStorage.setItem('hub_recent_apps', JSON.stringify(recentApps));
                renderRecentApps();
            }

            loaderBar.style.width = '30%';
            placeholder.style.display = 'none'; 
            skyCanvas.style.display = 'none'; 
            appFrame.classList.add('active');   
            appFrame.src = url;
            appFrame.onload = () => {
                loaderBar.style.width = '100%';
                setTimeout(() => { loaderBar.style.width = '0%'; }, 300);
            };
        }

        function goHome() {
            closeSidebar();
            appFrame.classList.remove('active');
            appFrame.src = '';
            placeholder.style.display = 'flex'; 
            skyCanvas.style.display = 'block'; 
        }

        // --- LOGIKA JAM REAL-TIME ---
        function updateClock() {
            const timeText = document.getElementById('timeText');
            const now = new Date();
            timeText.innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- LOGIKA SAPAAN, RENDER LANGIT, & TEMA SIDEBAR ---
        function updateSkyAndDate() {
            const dateText = document.getElementById('dateText');
            const greetingText = document.getElementById('greetingText');
            const now = new Date();
            const hour = now.getHours();
            
            let greeting = "Selamat Malam";
            let timeOfDay = "night";

            if (hour >= 5 && hour < 11) { greeting = "Selamat Pagi"; timeOfDay = "morning"; }
            else if (hour >= 11 && hour < 15) { greeting = "Selamat Siang"; timeOfDay = "day"; }
            else if (hour >= 15 && hour < 18) { greeting = "Selamat Sore"; timeOfDay = "afternoon"; }

            greetingText.innerText = greeting;
            dateText.innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            // Otomatis ubah warna font mengikuti terang/gelapnya langit
            if (timeOfDay === "night" || timeOfDay === "afternoon") {
                greetingContainer.style.color = "#ffffff";
                recentContainer.style.color = "#ffffff";
                sidebar.style.color = "#ffffff"; // Font sidebar ikut terang
                greetingContainer.style.textShadow = "0 2px 10px rgba(0,0,0,0.4)";
                recentContainer.style.textShadow = "0 2px 10px rgba(0,0,0,0.4)";
            } else {
                greetingContainer.style.color = "#1a1a1a";
                recentContainer.style.color = "#1a1a1a";
                sidebar.style.color = "#1a1a1a"; // Font sidebar ikut gelap
                greetingContainer.style.textShadow = "none";
                recentContainer.style.textShadow = "none";
            }

            // --- TEMA ESTETIK SIDEBAR (MENGIKUTI LANGIT) ---
            const skyGradients = {
                morning: "linear-gradient(180deg, #87CEEB 0%, #FFB6C1 50%, #FFDAB9 100%)",
                day: "linear-gradient(180deg, #4facfe 0%, #00f2fe 100%)",
                afternoon: "linear-gradient(180deg, #2c3e50 0%, #fd746c 100%)",
                night: "linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%)"
            };
            sidebar.style.background = skyGradients[timeOfDay];

            // --- RENDER ANIMASI LANGIT (DASHBOARD) ---
            skyCanvas.className = `sky-${timeOfDay}`;
            let skyHtml = '';
            if (timeOfDay === 'morning') {
                skyHtml = '<div class="celestial sun-morning"></div>';
            } else if (timeOfDay === 'day') {
                skyHtml = '<div class="celestial sun-day"></div><div class="cloud c1"></div><div class="cloud c2"></div>';
            } else if (timeOfDay === 'afternoon') {
                skyHtml = '<div class="celestial sun-afternoon"></div>';
            } else if (timeOfDay === 'night') {
                skyHtml = '<div class="celestial moon-night"></div><div class="shooting-star"></div>';
                for(let i=0; i<25; i++) {
                   skyHtml += `<div class="star" style="width:2px; height:2px; top:${Math.random()*60}%; left:${Math.random()*100}%; opacity:${Math.random()}"></div>`;
                }
            }
            skyCanvas.innerHTML = skyHtml;
        }
        updateSkyAndDate();
        setInterval(updateSkyAndDate, 60000); 

        // --- GESTURE SWIPE ---
        let startX = 0, currentX = 0;
        document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            currentX = e.changedTouches[0].clientX;
            let diffX = currentX - startX;
            // Geser dari ujung kiri ke kanan untuk BUKA
            if (startX < 50 && diffX > 70) openSidebar(); 
            // Geser dari arah manapun ke kiri untuk TUTUP
            else if (sidebar.classList.contains('open') && diffX < -50) closeSidebar(); 
        }, {passive: true});
    </script>
</body>
</html>
