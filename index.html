<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto OTP Shopee Indonesia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Auto OTP Shopee 🇮🇩</h1>
        <p>Ambil nomor virtual untuk verifikasi.</p>

        <div class="form-group">
            <label>Pilih Harga (Server):</label>
            <div id="productList" class="product-list">
                <div class="status-text">Memuat data Shopee Indonesia...</div>
            </div>
        </div>

        <button id="btnOrder" disabled>Dapatkan Nomor</button>

        <div id="statusArea" class="hidden">
            <h3>Status Pesanan</h3>
            <p><strong>Nomor:</strong> <span id="displayNumber" class="text-large">-</span></p>
            <p><strong>Status:</strong> <span id="displayStatus">Menunggu...</span></p>
            <div class="otp-box">
                <p><strong>KODE OTP:</strong></p>
                <span id="displayOtp">-</span>
            </div>
            
            <div class="action-buttons">
                 <button id="btnCancel" class="btn-danger hidden">Batalkan Pesanan</button>
                 <button id="btnFinish" class="btn-success hidden">Selesai (Tutup)</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
