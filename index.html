<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero-SMS Pro 🇮🇩</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="theme-hero">
    <div id="appView" class="container">
        
        <div class="top-switchers">
            <select onchange="window.location.href=this.value" class="server-select server-select-sm">
                <option value="index.html" selected>🔵 Hero-SMS</option>
                <option value="index2.html">🟠 SMSCode</option>
            </select>
        </div>

        <button onclick="document.getElementById('btnOpenNotes').click()" class="btn-switch" style="position: absolute; top: 15px; right: 15px; background-color: var(--bg-card); color: var(--primary-color); border-color: var(--border-color); width: 32px; padding: 0; justify-content: center; height: 32px; z-index: 5; border-radius: 8px;">
            <i class="fas fa-sticky-note"></i>
        </button>
        <button id="btnOpenNotes" class="hidden"></button>

        <div class="app-header-container">
            <div class="header-titles">
                <h1>Hero-SMS 🇮🇩</h1>
                <p class="subtitle">👨‍💻 Akun: <strong id="currentAccountName">Memuat...</strong></p>
            </div>
        </div>
        
        <div class="section" style="margin-bottom: 5px;">
            <div id="activeOrdersContainer">
                <div class="status-text">Belum ada pesanan aktif.</div>
            </div>
        </div>

        <div class="balance-container">
            <div class="balance-badge">
                <span class="balance-label">Saldo</span>
                <span id="balanceDisplay" class="balance-value">...</span>
            </div>
        </div>

        <div class="section">
            <div id="productList" class="product-list">
                <div class="status-text">Memuat data Server...</div>
            </div>
            <button id="btnOrder" class="btn-primary" disabled>Pesan Nomor Baru</button>
        </div>
    </div>

    <div id="notesListModal" class="modal hidden">
        <div class="modal-content" style="max-height: 85vh; display: flex; flex-direction: column;">
            <div style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 15px;">
                <div style="text-align: left;"><h3 style="margin:0; font-size: 18px; color: var(--text-primary);">Catatanku <span id="notesCount" style="font-size:14px; color:var(--text-secondary);">(0)</span></h3></div>
                <div style="text-align: center;"><button onclick="openAddNoteModal()" class="btn-success" style="height: 35px; border-radius: 8px; font-size: 13px;"><i class="fas fa-plus"></i> Baru</button></div>
                <div style="text-align: right;"><button onclick="closeNotesListModal()" class="btn-danger" style="width: 35px; height: 35px; padding: 0; border-radius: 8px;"><i class="fas fa-times"></i></button></div> 
            </div>
            <div id="notes-grid" class="notes-list" style="overflow-y: auto; flex: 1; padding-right: 5px;"></div>
        </div>
    </div>

    <div id="noteFormModal" class="modal hidden">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="form-modal-title" style="margin:0; color: var(--text-primary);">Catatan Baru</h3>
                <button onclick="handleCancelNoteForm()" class="btn-danger" style="width: 35px; height: 35px; padding: 0; border-radius: 8px;"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" id="note-title" class="form-input" placeholder="Judul (Kosong = Auto Number)">
            <textarea id="note-content" class="form-input" placeholder="Tulis catatan Anda..." style="min-height: 150px; resize: vertical;"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-danger" style="flex:1; height: 45px; font-size: 14px;" onclick="handleCancelNoteForm()">Batal</button>
                <button class="btn-success" style="flex:2; height: 45px; font-size: 14px;" onclick="handleSaveNote()"><i class="fas fa-check"></i> Simpan</button>
            </div>
        </div>
    </div>

    <div id="noteDetailModal" class="modal hidden">
        <div class="modal-content" style="max-height: 85vh; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span id="view-tag" style="font-size: 12px; color: var(--text-secondary);"></span>
                <button onclick="closeNoteDetailModal()" class="btn-danger" style="width: 35px; height: 35px; padding: 0; border-radius: 8px;"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" id="view-title" readonly style="width:100%; border:none; padding:0; font-size:22px; font-weight:900; margin-bottom:15px; background:transparent; color: var(--text-primary); outline: none;">
            <div id="view-content" style="flex:1; overflow-y: auto; background: var(--bg-card); border-radius: 12px; padding: 15px; font-size: 14px; margin-bottom: 15px; min-height: 150px; white-space: pre-wrap;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" style="flex: 0 0 50px; height: 50px; padding: 0;" onclick="editFromDetail()"><i class="fas fa-edit"></i></button>
                <button class="btn-success" style="flex: 1; height: 50px; font-size: 16px;" onclick="copyNoteContent()"><i class="fas fa-copy"></i> Salin</button>
                <button class="btn-danger" style="flex: 0 0 50px; height: 50px; padding: 0;" onclick="confirmDeleteNote()"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>

    <div id="exitModal" class="modal hidden">
        <div class="modal-content">
            <h3 style="color: var(--primary-color);">Keluar Aplikasi?</h3>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">Yakin ingin menutup aplikasi?</p>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeExitModal()" class="btn-primary" style="flex:1; height: 50px; background: var(--bg-card); color: var(--text-primary);">Batal</button>
                <button onclick="confirmExit()" class="btn-danger" style="flex:1; height: 50px;">Keluar</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast">Notifikasi!</div>

    <script src="app2.js"></script>
</body>
</html>
