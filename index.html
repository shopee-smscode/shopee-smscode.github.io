<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee OTP Pro 🇮🇩</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="accountView" class="container">
        <div class="header-app">
            <h1>Pilih Akun</h1>
            <p class="subtitle">Akun terhubung aman via Cloudflare</p>
        </div>
        
        <div id="accountListContainer" class="account-list">
            <div class="status-text">Memuat daftar akun...</div>
        </div>
    </div>

    <div id="appView" class="container hidden">
        <div class="app-header-container">
            <div class="header-titles">
                <h1>Shopee OTP Pro 🇮🇩</h1>
                <p class="subtitle">Akun: <strong id="currentAccountName">-</strong></p>
            </div>
            <button id="btnSwitchAccount" class="btn-switch">⇄ Ganti Akun</button>
        </div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="balance-badge">Saldo: <span id="balanceDisplay">Memuat...</span></div>
        </div>

        <div class="section">
            <h3 class="section-title">Pesanan Aktif (<span id="activeCount">0</span>)</h3>
            <div id="activeOrdersContainer">
                <div class="status-text">Belum ada pesanan aktif.</div>
            </div>
        </div>

        <hr>

        <div class="section">
            <label class="section-label">Pilih Harga & Server:</label>
            <div id="productList" class="product-list">
                <div class="status-text">Memuat data Shopee Indonesia...</div>
            </div>
            <button id="btnOrder" disabled>Pesan Nomor Baru</button>
        </div>
    </div>

    <div id="toast" class="toast">Berhasil disalin!</div>

    <script src="app.js"></script>
</body>
</html>
