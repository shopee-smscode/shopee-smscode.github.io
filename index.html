<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee OTP Pro 🇮🇩</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="accountView" class="container">
        <div class="header-app login-header">
            <div class="logo-circle">🛒</div>
            <h1>Pilih Akun</h1>
            <p class="subtitle">Masuk menggunakan sesi aman Cloudflare</p>
        </div>
        
        <div id="accountListContainer" class="account-list">
            <div class="status-text">Memuat daftar akun...</div>
        </div>
    </div>

    <div id="appView" class="container hidden">
        <div class="app-header-container">
            <div class="header-titles">
                <h1>Shopee OTP 🇮🇩</h1>
                <p class="subtitle">👨‍💻 Akun: <strong id="currentAccountName">-</strong></p>
            </div>
            <button id="btnSwitchAccount" class="btn-switch">⇄ Ganti</button>
        </div>
        
        <div class="balance-container">
            <div class="balance-badge">
                <span class="balance-label">Sisa Saldo</span>
                <span id="balanceDisplay" class="balance-value">Memuat...</span>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h3 class="section-title">Pesanan Aktif (<span id="activeCount">0</span>)</h3>
            </div>
            <div id="activeOrdersContainer">
                <div class="status-text">Belum ada pesanan aktif.</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h3 class="section-title">Pilih Harga & Server</h3>
            </div>
            <div id="productList" class="product-list">
                <div class="status-text">Memuat data Shopee Indonesia...</div>
            </div>
            <button id="btnOrder" class="btn-primary" disabled>Pesan Nomor Baru</button>
        </div>
    </div>

    <div id="toast" class="toast">Berhasil disalin!</div>

    <script src="app.js"></script>
</body>
</html>
