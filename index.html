<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A S E A Hub</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A S E A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1183/1183672.png">

    <style>
        :root { --bg-color: #f0f2f5; --white: #ffffff; --text-main: #050505; --text-muted: #65676b; --primary: #1877f2; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); overflow: hidden; }

        /* ========================================= */
        /* LAYAR KONEKSI TERPUTUS (OFFLINE KEEPER)   */
        /* ========================================= */
        #offlineOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 999999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #ffcc00;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #offlineOverlay.show { opacity: 1; pointer-events: all; }
        .offline-icon { font-size: 65px; margin-bottom: 20px; animation: pulse 1.5s infinite; filter: drop-shadow(0 0 15px rgba(255,204,0,0.5));}
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.6; } 100% { transform: scale(1); opacity: 1; } }
        .offline-text { font-size: 22px; font-weight: 900; letter-spacing: 2px; margin: 0; text-align: center; text-transform: uppercase; }

        /* TOMBOL MENGAMBANG */
        .floating-menu-btn { position: fixed; bottom: 25px; right: 25px; width: 42px; height: 42px; background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; color: #1a1a1a; box-shadow: 0 4px 15px rgba(0,0,0,0.25); z-index: 90; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.3s ease, background-color 0.2s; }
        .floating-menu-btn:active { transform: scale(0.85) rotate(15deg); background-color: #ffffff; }

        /* AREA KONTEN (FULL SCREEN) */
        .main-workspace { height: 100%; width: 100%; position: relative; background: #000; }
        #appFrame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: var(--bg-color); z-index: 10; display: none; }
        #appFrame.active { display: block; }

        /* OVERLAY SIDEBAR */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .overlay.show { opacity: 1; pointer-events: all; }

        /* ========================================= */
        /* MENU SIDEBAR & MODE MINIMIZE              */
        /* ========================================= */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--white); color: var(--text-main); z-index: 101; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), left 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 1s ease, color 0.5s ease; box-shadow: 2px 0 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        
        .sidebar.minimized { width: 80px; }
        .sidebar.minimized .sidebar-title, .sidebar.minimized .close-btn, .sidebar.minimized .menu-text { display: none; }
        .sidebar.minimized .sidebar-header { justify-content: center; padding: 25px 0 15px 0; }
        .sidebar.minimized .menu-item { padding: 12px 0; justify-content: center; }
        .sidebar.minimized .home-item { padding: 16px 0; justify-content: center; }
        .sidebar.minimized .sidebar-footer { justify-content: center; padding: 15px 0; }

        /* Header Sidebar dengan gambar Tron & efek gelap */
        .sidebar-header { 
            padding: 25px 20px 15px; 
            border-bottom: 2px solid #ffcc00; 
            display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.8)), url('https://miro.medium.com/v2/resize:fit:1100/format:webp/1*3VfaH2XLWLRCYl-z3Dd5Hg.png'); 
            background-size: cover; background-position: center; color: #ffffff; 
        }
        
        .sidebar-title { font-size: 20px; font-weight: 800; margin: 0; color: inherit; letter-spacing: 2px; margin-right: -2px; text-align: center; }
        .close-btn { font-size: 24px; color: inherit; opacity: 0.8; cursor: pointer; transition: 0.2s; }
        .close-btn:active { transform: scale(0.8); }
        
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 0; }
        
        /* Item Aplikasi Biasa */
        .menu-item { position: relative; display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: inherit; text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; cursor: pointer; }
        .menu-item:active { background-color: rgba(255, 255, 255, 0.25); }
        .menu-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; background: rgba(255, 255, 255, 0.5); }
        
        /* Item Khusus "Beranda" */
        .home-item { position: relative; padding: 16px 20px; font-size: 14px; font-weight: 800; border-bottom: 1px solid rgba(128,128,128,0.15); margin-bottom: 10px; }
        .home-item .menu-icon { width: 38px; height: 38px; font-size: 18px; box-shadow: 0 3px 8px rgba(0,0,0,0.08); margin-left: -3px; margin-right: -3px; }
        .home-item:active { background-color: rgba(255, 255, 255, 0.15); }

        /* ========================================= */
        /* HIGHLIGHT MENU AKTIF (MARKER)             */
        /* ========================================= */
        .active-app { background-color: rgba(24, 119, 242, 0.08) !important; color: var(--primary) !important; }
        .active-app::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background-color: var(--primary); border-top-right-radius: 4px; border-bottom-right-radius: 4px; }

        .sidebar-footer { padding: 15px 20px; border-top: 1px solid rgba(128, 128, 128, 0.2); display: flex; justify-content: flex-end; align-items: center; }
        .toggle-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.08); display: flex; justify-content: center; align-items: center; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; color: inherit;}
        .toggle-btn:active { transform: scale(0.85); background: rgba(0,0,0,0.15); }

        .loader-bar { position: absolute; top: 0; left: 0; width: 0%; height: 3px; background: var(--primary); transition: width 0.3s; z-index: 95; }

        /* PUSAT KOMANDO & LANGIT */
        #placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; z-index: 2; }
        #skyCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; transition: background 1s ease; }
        .sky-morning { background: linear-gradient(180deg, #87CEEB 0%, #FFB6C1 50%, #FFDAB9 100%); }
        .sky-day { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); }
        .sky-afternoon { background: linear-gradient(180deg, #2c3e50 0%, #fd746c 100%); }
        .sky-night { background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
        .celestial { position: absolute; border-radius: 50%; }
        .sun-morning { width: 80px; height: 80px; background: #FFD700; right: 15%; bottom: -100px; box-shadow: 0 0 40px #FFD700; animation: sunrise 4s ease-out forwards; }
        .sun-day { width: 100px; height: 100px; background: #FFDF00; right: -20px; top: -20px; box-shadow: 0 0 60px #FFDF00; }
        .sun-afternoon { width: 90px; height: 90px; background: #FF4500; right: 20%; bottom: 100px; box-shadow: 0 0 50px #FF4500; animation: sunset 4s ease-in forwards; }
        .moon-night { width: 70px; height: 70px; background: #F4F6F0; right: 20px; top: 30px; box-shadow: 0 0 30px #F4F6F0; }
        .moon-night::after { content: ''; position: absolute; top: -10px; right: -10px; width: 60px; height: 60px; background: inherit; border-radius: 50%; background: var(--bg-night); } 
        @keyframes sunrise { to { bottom: 100px; } }
        @keyframes sunset { to { bottom: -50px; opacity: 0.5; } }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .c1 { width: 120px; height: 40px; top: 15%; animation: wind 25s linear infinite; }
        .c1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .c1::after { width: 45px; height: 45px; top: -15px; right: 20px; }
        .c2 { width: 80px; height: 30px; top: 35%; opacity: 0.5; animation: wind 18s linear infinite reverse; }
        .c2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        @keyframes wind { 0% { left: -150px; } 100% { left: 100vw; } }
        .star { position: absolute; background: white; border-radius: 50%; }
        .shooting-star { position: absolute; top: 10%; right: 20%; width: 120px; height: 2px; background: linear-gradient(90deg, rgba(255,255,255,1), rgba(255,255,255,0)); transform: rotate(-45deg); opacity: 0; animation: shoot 5s infinite; }
        @keyframes shoot { 0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; } 15% { transform: translateX(-300px) translateY(300px) rotate(-45deg); opacity: 0; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="offlineOverlay">
        <div class="offline-icon">📡❌</div>
        <h2 class="offline-text">Koneksi Terputus</h2>
    </div>

    <div class="floating-menu-btn" id="menuBtn" onclick="openSidebar()">☰</div>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">A S E A</h2>
            <div class="close-btn" onclick="closeSidebar()">×</div>
        </div>
        
        <div class="sidebar-menu">
            <div class="menu-item home-item active-app" onclick="goHome()">
                <div class="menu-icon" style="background: rgba(255,255,255,0.85); color: #333;">🏠</div> 
                <span class="menu-text">Beranda</span>
            </div>
            
            <div id="appListContainer"></div>
        </div>

        <div class="sidebar-footer">
            <div class="toggle-btn" onclick="toggleSidebarSize()" id="toggleSidebarBtn">
                <span id="toggleIcon">&#10094;</span> </div>
        </div>
    </div>

    <div class="overlay" id="exitOverlay" style="z-index: 199;" onclick="closeExitModal()"></div>
    <div id="exitModal" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: var(--white); width: 90%; max-width: 260px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 200; opacity: 0; pointer-events: none; transition: 0.3s; color: #333;">
        <h3 style="margin: 0 0 10px; text-align: center; color: #333; font-size: 18px;">Keluar Aplikasi?</h3>
        <p style="text-align: center; font-size: 13px; margin-bottom: 20px; color: #555;">Apakah Anda yakin ingin menutup Workspace ini?</p>
        <div style="display: flex; gap: 10px;">
            <button style="flex: 1; padding: 10px; border: none; border-radius: 10px; background: #eee; font-weight: 700; color: #333; cursor: pointer; font-size: 13px; transition: 0.2s;" onclick="closeExitModal()">Batal</button>
            <button style="flex: 1; padding: 10px; border: none; border-radius: 10px; background: #cb2431; font-weight: 700; color: white; cursor: pointer; font-size: 13px; transition: 0.2s;" onclick="confirmExit()">Keluar</button>
        </div>
    </div>

    <div class="main-workspace">
        <div class="loader-bar" id="loaderBar"></div>
        <div id="skyCanvas"></div>

        <div id="placeholder">
            <div style="text-align: center; margin-bottom: 40px; transition: color 0.3s; width: 100%;" id="greetingContainer">
                <h1 style="margin: 0; font-size: 26px; font-weight: 700;" id="greetingText">Selamat Datang</h1>
                <div id="timeText" style="font-size: 64px; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; letter-spacing: -2px;">00:00</div>
                <p style="margin: 0; font-size: 15px; font-weight: 600; opacity: 0.9;" id="dateText">Memuat tanggal...</p>
            </div>
            <div style="width: 100%; max-width: 340px; text-align: center; transition: color 0.3s;" id="recentContainer">
                <div style="font-size: 11px; font-weight: 800; margin-bottom: 15px; opacity: 0.8; letter-spacing: 1px;">TERAKHIR DIBUKA</div>
                <div id="recentAppsRow" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;"></div>
            </div>
        </div>
        <iframe id="appFrame"></iframe>
    </div>

    <script>
        // =========================================================================
        // 🚀 INJEKSI PWA MANIFEST OTOMATIS
        // =========================================================================
        const manifestData = {
            "name": "A S E A",
            "short_name": "A S E A",
            "start_url": window.location.pathname,
            "display": "standalone",
            "background_color": "#000000",
            "theme_color": "#000000",
            "icons": [
                {
                    "src": "https://cdn-icons-png.flaticon.com/512/1183/1183672.png",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };
        const manifestUrl = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestData));
        document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestUrl}">`);

        // =========================================================================
        // 🔒 SISTEM PENDETEKSI JARINGAN (OFFLINE PROTECTOR)
        // =========================================================================
        const offlineOverlay = document.getElementById('offlineOverlay');
        const appFrame = document.getElementById('appFrame');
        
        window.addEventListener('offline', () => {
            offlineOverlay.classList.add('show');
        });

        window.addEventListener('online', () => {
            offlineOverlay.classList.remove('show');
            // Jika aplikasi sedang terbuka di dalam iframe, muat ulang (refresh) otomatis
            if (appFrame.classList.contains('active') && appFrame.src) {
                appFrame.src = appFrame.src;
            }
        });

        // Pengecekan jaringan langsung saat pertama kali dashboard dibuka
        if (!navigator.onLine) {
            offlineOverlay.classList.add('show');
        }

        // =========================================================================
        // 🔧 PENGATURAN DAFTAR APLIKASI
        // =========================================================================
        const DAFTAR_APLIKASI = [
            { url: 'Email Studio/emailstudio.html', name: 'Email Studio', icon: '📧', bg: '#fffbeb', color: '#b45309' },
            { url: 'Hero SMS/herosms.html', name: 'Hero SMS', icon: '💬', bg: '#e0e7ff', color: '#4f46e5' },
            { url: 'SMS Code/smscode.html', name: 'SMS Code', icon: '📩', bg: '#fce7f3', color: '#db2777' },
            { url: 'Affiliate/namadandirectlink.html', name: 'Affiliate', icon: '🛒', bg: '#ffedd5', color: '#ea580c' },
            { url: 'Notes/notes.html', name: 'Notes', icon: '📝', bg: '#f3f4f6', color: '#4b5563' }
        ];

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const placeholder = document.getElementById('placeholder');
        const loaderBar = document.getElementById('loaderBar');
        const menuBtn = document.getElementById('menuBtn');
        const skyCanvas = document.getElementById('skyCanvas');
        const greetingContainer = document.getElementById('greetingContainer');
        const recentContainer = document.getElementById('recentContainer');
        const recentAppsRow = document.getElementById('recentAppsRow');
        const appListContainer = document.getElementById('appListContainer');

        function toggleSidebarSize() {
            sidebar.classList.toggle('minimized');
            const toggleIcon = document.getElementById('toggleIcon');
            if (sidebar.classList.contains('minimized')) { toggleIcon.innerHTML = '&#10095;'; } 
            else { toggleIcon.innerHTML = '&#10094;'; }
        }

        function renderSidebarApps() {
            let html = '';
            DAFTAR_APLIKASI.forEach(app => {
                html += `
                <div class="menu-item app-item" data-url="${app.url}" onclick="loadApp('${app.url}', '${app.name}', '${app.icon}', '${app.bg}', '${app.color}')">
                    <div class="menu-icon" style="background:${app.bg}; color:${app.color};">${app.icon}</div> 
                    <span class="menu-text">${app.name}</span>
                </div>`;
            });
            appListContainer.innerHTML = html;
        }
        renderSidebarApps();

        // --- SISTEM UPDATE MARKER ---
        function setMenuMarker(url) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active-app'));
            if (!url) {
                document.querySelector('.home-item').classList.add('active-app');
            } else {
                const items = document.querySelectorAll('.app-item');
                items.forEach(item => {
                    if (item.getAttribute('data-url') === url) {
                        item.classList.add('active-app');
                    }
                });
            }
        }

        // --- DETEKSI PERUBAHAN REAL-TIME PADA IFRAME ---
        appFrame.addEventListener('load', function() {
            loaderBar.style.width = '100%'; 
            setTimeout(() => { loaderBar.style.width = '0%'; }, 300);

            try {
                const currentUrl = appFrame.contentWindow.location.href;
                
                if (currentUrl === 'about:blank' || currentUrl === '' || currentUrl === window.location.href) {
                    return; 
                }

                for (let app of DAFTAR_APLIKASI) {
                    if (currentUrl.includes(encodeURI(app.url)) || currentUrl.includes(app.url)) {
                        setMenuMarker(app.url);
                        localStorage.setItem('hub_last_session', app.url);
                        break;
                    }
                }
            } catch (e) {
                // Mengabaikan error jika CORS
            }
        });

        let recentApps = JSON.parse(localStorage.getItem('hub_recent_apps')) || [];

        function renderRecentApps() {
            if (recentApps.length === 0) {
                recentAppsRow.innerHTML = '<span style="font-size: 13px; opacity: 0.7;">Belum ada riwayat.</span>';
                return;
            }
            
            let html = '';
            recentApps.forEach(app => {
                html += `
                <div onclick="loadApp('${app.url}', '${app.name}', '${app.icon}', '${app.bg}', '${app.color}')" 
                     style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.1s;">
                    <div style="width: 56px; height: 56px; border-radius: 16px; background: ${app.bg}; color: ${app.color}; 
                                display: flex; justify-content: center; align-items: center; font-size: 26px; 
                                box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                        ${app.icon}
                    </div>
                    <span style="font-size: 11px; font-weight: 700; max-width: 65px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${app.name}</span>
                </div>`;
            });
            recentAppsRow.innerHTML = html;
        }
        renderRecentApps(); 

        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); menuBtn.style.transform = "scale(0) rotate(-180deg)"; menuBtn.style.opacity = "0"; }
        function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); menuBtn.style.transform = "scale(1) rotate(0deg)"; menuBtn.style.opacity = "1"; }

        function loadApp(url, name, icon, bg, color) {
            closeSidebar(); 
            if(!url) return;

            // CEGAH MEMBUKA APLIKASI JIKA OFFLINE
            if (!navigator.onLine) {
                offlineOverlay.classList.add('show');
                return;
            }

            if(name && icon) {
                recentApps = recentApps.filter(a => a.url !== url);
                recentApps.unshift({ url, name, icon, bg, color });
                if(recentApps.length > 4) recentApps.pop();
                localStorage.setItem('hub_recent_apps', JSON.stringify(recentApps));
                renderRecentApps();
            }

            setMenuMarker(url);
            localStorage.setItem('hub_last_session', url);

            loaderBar.style.width = '30%';
            placeholder.style.display = 'none'; 
            skyCanvas.style.display = 'none'; 
            appFrame.classList.add('active');   
            appFrame.src = url;
        }

        function goHome() {
            closeSidebar();
            appFrame.classList.remove('active');
            appFrame.src = '';
            placeholder.style.display = 'flex'; 
            skyCanvas.style.display = 'block'; 
            
            localStorage.removeItem('hub_last_session');
            setMenuMarker(null);
        }

        const lastSession = localStorage.getItem('hub_last_session');
        if (lastSession) {
            if (navigator.onLine) {
                placeholder.style.display = 'none'; 
                skyCanvas.style.display = 'none'; 
                appFrame.classList.add('active');   
                appFrame.src = lastSession;
                setMenuMarker(lastSession);
            } else {
                goHome(); // Paksa masuk ke beranda saat offline
            }
        } else {
            setMenuMarker(null);
        }

        function updateClock() { document.getElementById('timeText').innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); }
        setInterval(updateClock, 1000); updateClock();

        function updateSkyAndDate() {
            const dateText = document.getElementById('dateText'); const greetingText = document.getElementById('greetingText');
            const now = new Date(); const hour = now.getHours();
            let greeting = "Selamat Malam"; let timeOfDay = "night";

            if (hour >= 5 && hour < 11) { greeting = "Selamat Pagi"; timeOfDay = "morning"; }
            else if (hour >= 11 && hour < 15) { greeting = "Selamat Siang"; timeOfDay = "day"; }
            else if (hour >= 15 && hour < 18) { greeting = "Selamat Sore"; timeOfDay = "afternoon"; }

            greetingText.innerText = greeting;
            dateText.innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            if (timeOfDay === "night" || timeOfDay === "afternoon") {
                greetingContainer.style.color = "#ffffff"; recentContainer.style.color = "#ffffff"; sidebar.style.color = "#ffffff"; 
                greetingContainer.style.textShadow = "0 2px 10px rgba(0,0,0,0.4)"; recentContainer.style.textShadow = "0 2px 10px rgba(0,0,0,0.4)";
            } else {
                greetingContainer.style.color = "#1a1a1a"; recentContainer.style.color = "#1a1a1a"; sidebar.style.color = "#1a1a1a"; 
                greetingContainer.style.textShadow = "none"; recentContainer.style.textShadow = "none";
            }

            const skyGradients = { morning: "linear-gradient(180deg, #87CEEB 0%, #FFB6C1 50%, #FFDAB9 100%)", day: "linear-gradient(180deg, #4facfe 0%, #00f2fe 100%)", afternoon: "linear-gradient(180deg, #2c3e50 0%, #fd746c 100%)", night: "linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%)" };
            sidebar.style.background = skyGradients[timeOfDay];

            skyCanvas.className = `sky-${timeOfDay}`; let skyHtml = '';
            if (timeOfDay === 'morning') skyHtml = '<div class="celestial sun-morning"></div>';
            else if (timeOfDay === 'day') skyHtml = '<div class="celestial sun-day"></div><div class="cloud c1"></div><div class="cloud c2"></div>';
            else if (timeOfDay === 'afternoon') skyHtml = '<div class="celestial sun-afternoon"></div>';
            else if (timeOfDay === 'night') { skyHtml = '<div class="celestial moon-night"></div><div class="shooting-star"></div>'; for(let i=0; i<25; i++) skyHtml += `<div class="star" style="width:2px; height:2px; top:${Math.random()*60}%; left:${Math.random()*100}%; opacity:${Math.random()}"></div>`; }
            skyCanvas.innerHTML = skyHtml;
        }
        updateSkyAndDate(); setInterval(updateSkyAndDate, 60000); 

        let startX = 0, currentX = 0;
        document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            currentX = e.changedTouches[0].clientX; let diffX = currentX - startX;
            if (startX < 50 && diffX > 70) openSidebar(); 
            else if (sidebar.classList.contains('open') && diffX < -50) closeSidebar(); 
        }, {passive: true});

        // --- JEBAKAN TOMBOL KEMBALI ---
        history.pushState(null, null, location.href);
        window.onpopstate = function(event) {
            if (sidebar.classList.contains('open')) { closeSidebar(); history.pushState(null, null, location.href); } 
            else if (appFrame.classList.contains('active')) { goHome(); history.pushState(null, null, location.href); } 
            else if (document.getElementById('exitModal').style.opacity === '1') { closeExitModal(); history.pushState(null, null, location.href); }
            else { openExitModal(); history.pushState(null, null, location.href); }
        };

        const exitModal = document.getElementById('exitModal'); const exitOverlay = document.getElementById('exitOverlay');
        function openExitModal() { exitModal.style.opacity = '1'; exitModal.style.transform = 'translate(-50%, -50%) scale(1)'; exitModal.style.pointerEvents = 'all'; exitOverlay.style.opacity = '1'; exitOverlay.style.pointerEvents = 'all'; }
        function closeExitModal() { exitModal.style.opacity = '0'; exitModal.style.transform = 'translate(-50%, -50%) scale(0.9)'; exitModal.style.pointerEvents = 'none'; exitOverlay.style.opacity = '0'; exitOverlay.style.pointerEvents = 'none'; }
        function confirmExit() { window.onpopstate = null; closeExitModal(); history.back(); }
    </script>
</body>
</html>
