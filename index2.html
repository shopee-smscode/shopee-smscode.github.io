<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee OTP Pro 🇮🇩</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="appView" class="container">
        
        <div class="top-switchers" style="position: absolute; top: 15px; left: 15px; right: 65px; z-index: 10; display: flex; gap: 10px;">
            <select onchange="window.location.href=this.value" class="server-select" style="font-size: 14px; padding: 10px 12px; border-radius: 10px; flex: 1; font-weight: 800; box-shadow: 0 2px 6px rgba(0,0,0,0.05); color: #ea580c; border-color: #fdba74;">
                <option value="index.html">🔵 Hero-SMS</option>
                <option value="index2.html" selected>🟠 SMSCode</option>
            </select>
            
            <select id="accountSwitcher" onchange="switchAccount(this.value)" class="server-select" style="font-size: 14px; padding: 10px 12px; border-radius: 10px; flex: 1; font-weight: 700; background-color: #f9fafb; color: #374151; border-color: #d1d5db; box-shadow: 0 2px 6px rgba(0,0,0,0.05);">
                <option value="nomor_01" selected>👤 nomor_01</option>
            </select>
        </div>

        <button id="btnOpenNotes" class="btn-switch" style="position: absolute; top: 15px; right: 15px; background-color: #fef08a; color: #b45309; border-color: #fde68a; width: auto; padding: 10px 12px; height: auto; z-index: 5; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);">
            <i class="fas fa-sticky-note"></i>
        </button>

        <div class="app-header-container" style="margin-top: 45px;">
            <div class="header-titles">
                <h1>Shopee OTP 🇮🇩</h1>
                <p class="subtitle">👨‍💻 Akun: <strong id="currentAccountName">Memuat...</strong></p>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
            </div>
        </div>
        
        <div class="balance-container">
            <div class="balance-badge">
                <span class="balance-label">Sisa Saldo</span>
                <span id="balanceDisplay" class="balance-value">Memuat...</span>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h3 class="section-title">Pesanan Aktif (<span id="activeCount">0</span>)</h3>
            </div>
            <div id="activeOrdersContainer">
                <div class="status-text">Belum ada pesanan aktif.</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h3 class="section-title">Top 3 Harga Termurah</h3>
            </div>
            <div id="productList" class="product-list">
                <div class="status-text">Memuat data Server...</div>
            </div>
            <button id="btnOrder" class="btn-primary" disabled>Pesan Nomor Baru</button>
        </div>
    </div>

    <div id="exitModal" class="modal hidden">
        <div class="modal-content">
            <h3 class="modal-title">Keluar Aplikasi?</h3>
            <p class="modal-desc">Apakah Anda yakin ingin menutup dan keluar dari aplikasi ini?</p>
            <div class="modal-actions">
                <button onclick="closeExitModal()" class="btn-switch" style="width:48%; padding:12px;">Batal</button>
                <button onclick="confirmExit()" class="btn-danger" style="width:48%; padding:12px; border-radius:8px;">Keluar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Berhasil disalin!</div>

    <script src="app.js"></script>
</body>
</html>
